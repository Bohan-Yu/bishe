<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假新闻检测 - 信源分类知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stat-card { border: 1px solid #e5e7eb; border-radius: 12px; background: #fff; padding: 14px; }
        .chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 12px; background: #eef2ff; color: #4338ca; }
        .chip-source-custom { background: #ecfeff; color: #0f766e; }
        .chip-source-builtin { background: #f3f4f6; color: #374151; }
        .table-wrap { overflow-x: auto; }
        .reason-box { max-width: 360px; white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-indigo-600 text-white px-6 py-3 flex items-center justify-between shadow">
    <h1 class="text-xl font-bold">🔍 假新闻检测系统</h1>
    <div class="space-x-4">
        <a href="/" class="hover:underline">💬 聊天查证</a>
        <a href="/database" class="hover:underline">📊 数据库</a>
        <a href="/source-credibility" class="hover:underline font-semibold">🧭 信源知识库</a>
    </div>
</nav>

<div class="max-w-7xl mx-auto p-4">
    <div class="bg-white rounded-lg shadow p-4 mb-4 flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[220px]">
            <label class="text-sm text-gray-500 block mb-1">搜索域名 / 名称 / 原因</label>
            <input id="searchInput" type="text" placeholder="如 reuters / 路透 / 研究机构"
                class="border border-gray-300 rounded px-3 py-2 w-full focus:ring-2 focus:ring-indigo-400 focus:outline-none" />
        </div>
        <div>
            <label class="text-sm text-gray-500 block mb-1">层级筛选</label>
            <select id="tierSelect" class="border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                <option value="">全部层级</option>
                <option value="official">官方权威</option>
                <option value="mainstream">主流媒体</option>
                <option value="professional">专业媒体</option>
                <option value="portal">门户平台</option>
                <option value="self_media">自媒体</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-500 block mb-1">国家筛选</label>
            <select id="countrySelect" class="border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                <option value="">全部国家</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-500 block mb-1">来源范围</label>
            <select id="scopeSelect" class="border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                <option value="all">全部</option>
                <option value="builtin">内置知识库</option>
                <option value="custom">LLM补录</option>
            </select>
        </div>
        <button onclick="loadKnowledgeBase()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-medium transition">搜索</button>
        <button onclick="resetFilters()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded font-medium transition">重置</button>
    </div>

    <div id="statusMsg" class="hidden mb-4 p-3 rounded text-sm"></div>

    <div class="grid md:grid-cols-5 gap-3 mb-4">
        <div class="stat-card">
            <div class="text-sm text-gray-500">当前结果</div>
            <div id="totalCount" class="text-2xl font-bold text-gray-900 mt-1">0</div>
        </div>
        <div class="stat-card">
            <div class="text-sm text-gray-500">内置分类</div>
            <div id="builtinCount" class="text-2xl font-bold text-gray-900 mt-1">0</div>
        </div>
        <div class="stat-card">
            <div class="text-sm text-gray-500">LLM补录</div>
            <div id="customCount" class="text-2xl font-bold text-gray-900 mt-1">0</div>
        </div>
        <div class="stat-card">
            <div class="text-sm text-gray-500">国家分布</div>
            <div id="countrySummary" class="text-sm text-gray-700 mt-2">暂无</div>
        </div>
        <div class="stat-card">
            <div class="text-sm text-gray-500">层级分布</div>
            <div id="tierSummary" class="text-sm text-gray-700 mt-2">暂无</div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow table-wrap">
        <table class="w-full text-sm">
            <thead class="bg-gray-100 text-gray-600">
                <tr>
                    <th class="px-3 py-3 text-left">域名</th>
                    <th class="px-3 py-3 text-left">来源名</th>
                    <th class="px-3 py-3 text-center">国家</th>
                    <th class="px-3 py-3 text-center">层级</th>
                    <th class="px-3 py-3 text-center">分值</th>
                    <th class="px-3 py-3 text-center">来源</th>
                    <th class="px-3 py-3 text-left">说明</th>
                    <th class="px-3 py-3 text-center">操作</th>
                </tr>
            </thead>
            <tbody id="kbTable" class="divide-y divide-gray-100">
                <tr><td colspan="8" class="text-center py-8 text-gray-400">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function escHtml(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
let editingDomain = '';
let currentItems = [];

function showStatus(type, msg) {
    const el = document.getElementById('statusMsg');
    el.classList.remove('hidden','bg-green-100','text-green-700','bg-red-100','text-red-700','bg-blue-100','text-blue-700');
    if(type==='success') el.classList.add('bg-green-100','text-green-700');
    else if(type==='error') el.classList.add('bg-red-100','text-red-700');
    else el.classList.add('bg-blue-100','text-blue-700');
    el.textContent = msg;
    el.classList.remove('hidden');
}

function renderStats(data) {
    document.getElementById('totalCount').textContent = data.total || 0;
    document.getElementById('builtinCount').textContent = (data.source_counts || {}).builtin || 0;
    document.getElementById('customCount').textContent = (data.source_counts || {}).custom || 0;
    const countrySummary = Object.entries(data.country_counts_readable || {})
        .slice(0, 8)
        .map(([label, count]) => `<span class="chip mr-2 mb-2">${escHtml(label)}: ${count}</span>`)
        .join('');
    document.getElementById('countrySummary').innerHTML = countrySummary || '暂无';
    const tierSummary = Object.entries(data.tier_counts_readable || {})
        .map(([label, count]) => `<span class="chip mr-2 mb-2">${escHtml(label)}: ${count}</span>`)
        .join('');
    document.getElementById('tierSummary').innerHTML = tierSummary || '暂无';
}

function renderSourceLabel(source) {
    if (source === 'builtin') {
        return { text: '内置', cls: 'chip-source-builtin' };
    }
    if (String(source || '').startsWith('manual')) {
        return { text: '人工编辑', cls: 'chip-source-custom' };
    }
    return { text: 'LLM补录', cls: 'chip-source-custom' };
}

function populateCountrySelect(countries, selected) {
    const select = document.getElementById('countrySelect');
    const options = ['<option value="">全部国家</option>'];
    (countries || []).forEach(country => {
        const isSelected = country === selected ? ' selected' : '';
        options.push(`<option value="${escHtml(country)}"${isSelected}>${escHtml(country)}</option>`);
    });
    select.innerHTML = options.join('');
}

function renderTable(items) {
    const tbody = document.getElementById('kbTable');
    if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-400">没有匹配的信源分类</td></tr>';
        return;
    }

    tbody.innerHTML = items.map(item => `
        <tr class="hover:bg-gray-50 align-top">
            <td class="px-3 py-3 font-mono text-xs text-gray-600">${escHtml(item.domain)}</td>
            <td class="px-3 py-3 text-gray-900">${editingDomain === item.domain ? `<input id="edit-name-${escHtml(item.domain)}" value="${escHtml(item.name)}" class="border border-gray-300 rounded px-2 py-1 w-full" />` : escHtml(item.name)}</td>
            <td class="px-3 py-3 text-center text-gray-700">${editingDomain === item.domain ? `<input id="edit-country-${escHtml(item.domain)}" value="${escHtml(item.country || '未知')}" class="border border-gray-300 rounded px-2 py-1 w-28" />` : escHtml(item.country || '未知')}</td>
            <td class="px-3 py-3 text-center">${editingDomain === item.domain ? `<select id="edit-tier-${escHtml(item.domain)}" class="border border-gray-300 rounded px-2 py-1">
                    <option value="official" ${item.tier === 'official' ? 'selected' : ''}>官方权威</option>
                    <option value="mainstream" ${item.tier === 'mainstream' ? 'selected' : ''}>主流媒体</option>
                    <option value="professional" ${item.tier === 'professional' ? 'selected' : ''}>专业媒体</option>
                    <option value="portal" ${item.tier === 'portal' ? 'selected' : ''}>门户平台</option>
                    <option value="self_media" ${item.tier === 'self_media' ? 'selected' : ''}>自媒体</option>
                    <option value="unknown" ${item.tier === 'unknown' ? 'selected' : ''}>未知来源</option>
                </select>` : `<span class="chip">${escHtml(item.tier_label)}</span>`}</td>
            <td class="px-3 py-3 text-center font-semibold text-gray-700">${escHtml(item.credibility_score)}</td>
            <td class="px-3 py-3 text-center">
                <span class="chip ${renderSourceLabel(item.knowledge_base_source).cls}">
                    ${renderSourceLabel(item.knowledge_base_source).text}
                </span>
            </td>
            <td class="px-3 py-3 text-xs text-gray-600"><div class="reason-box">${editingDomain === item.domain ? `<textarea id="edit-reason-${escHtml(item.domain)}" class="border border-gray-300 rounded px-2 py-1 w-full" rows="3">${escHtml(item.knowledge_base_reason || '')}</textarea>` : escHtml(item.knowledge_base_reason || '—')}</div></td>
            <td class="px-3 py-3 text-center whitespace-nowrap">
                ${editingDomain === item.domain
                    ? `<button onclick="saveEdit('${escHtml(item.domain)}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-xs mr-2">保存</button><button onclick="cancelEdit()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded text-xs">取消</button>`
                    : `<button onclick="startEdit('${escHtml(item.domain)}')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded text-xs">编辑</button>`}
            </td>
        </tr>
    `).join('');
}

function startEdit(domain) {
    editingDomain = domain;
    renderTable(currentItems);
}

function cancelEdit() {
    editingDomain = '';
    renderTable(currentItems);
}

async function saveEdit(domain) {
    const payload = {
        name: document.getElementById(`edit-name-${domain}`).value.trim(),
        country: document.getElementById(`edit-country-${domain}`).value.trim(),
        tier: document.getElementById(`edit-tier-${domain}`).value,
        reason: document.getElementById(`edit-reason-${domain}`).value.trim(),
    };

    try {
        showStatus('info', '正在保存信源条目...');
        const resp = await fetch('/api/source-credibility/' + encodeURIComponent(domain), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) {
            throw new Error(data.error || '保存失败');
        }
        editingDomain = '';
        await loadKnowledgeBase();
        showStatus('success', '信源条目已更新');
    } catch (err) {
        showStatus('error', '保存失败: ' + err.message);
    }
}

async function loadKnowledgeBase() {
    const q = document.getElementById('searchInput').value.trim();
    const tier = document.getElementById('tierSelect').value;
    const country = document.getElementById('countrySelect').value;
    const scope = document.getElementById('scopeSelect').value;
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (tier) params.set('tier', tier);
    if (country) params.set('country', country);
    if (scope) params.set('scope', scope);

    try {
        showStatus('info', '正在加载信源分类知识库...');
        const resp = await fetch('/api/source-credibility?' + params.toString());
        const data = await resp.json();
        currentItems = data.items || [];
        renderStats(data);
        populateCountrySelect(data.available_countries || [], data.country || '');
        renderTable(currentItems);
        showStatus('success', `已加载 ${data.total || 0} 条信源分类`);
    } catch (err) {
        showStatus('error', '加载失败: ' + err.message);
    }
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('tierSelect').value = '';
    document.getElementById('countrySelect').value = '';
    document.getElementById('scopeSelect').value = 'all';
    editingDomain = '';
    loadKnowledgeBase();
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        loadKnowledgeBase();
    }
});

loadKnowledgeBase();
</script>
</body>
</html>
