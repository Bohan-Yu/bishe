<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假新闻检测 - 聊天查证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 220px); }
        .msg-user { background: #dbeafe; }
        .msg-bot  { background: #f8f9fb; }
        .score-low  { color: #dc2626; }
        .score-mid  { color: #f59e0b; }
        .score-high { color: #16a34a; }
        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .img-preview { max-width: 120px; max-height: 120px; object-fit: cover; border-radius: 8px; }

        /* ---- 思考过程卡片 ---- */
        .evt-card {
            animation: fadeIn 0.3s ease;
            border-left: 3px solid #a5b4fc;
            margin-bottom: 8px;
        }
        .evt-card.thinking   { border-left-color: #818cf8; }
        .evt-card.tool_input { border-left-color: #38bdf8; }
        .evt-card.tool_output{ border-left-color: #34d399; }
        .evt-card.final      { border-left-color: #f59e0b; border-width: 4px; }
        .evt-card.db_status  { border-left-color: #a78bfa; }

        .src-main_agent  { --badge: #6366f1; }
        .src-sub_agent_1 { --badge: #0ea5e9; }
        .src-sub_agent_claim { --badge: #f59e0b; }
        .src-sub_agent_cross { --badge: #ec4899; }
        .src-sub_agent_2 { --badge: #8b5cf6; }
        .src-initial_search_agent { --badge: #f59e0b; }
        .src-evidence_collection_agent { --badge: #0ea5e9; }
        .src-supplemental_search_agent { --badge: #ec4899; }
        .src-analysis_agent { --badge: #14b8a6; }
        .src-tool_a, .src-tool_b, .src-tool_c1, .src-tool_c2, .src-tool_c3, .src-tool_d, .src-tool_e, .src-tool_f, .src-tool_save { --badge: #10b981; }

        /* 声明可信度热力图 */
        .claim-heatmap { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .claim-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: #f9fafb; border-left: 4px solid #e5e7eb; }
        .claim-bar.verdict-true { border-left-color: #16a34a; background: #f0fdf4; }
        .claim-bar.verdict-uncertain { border-left-color: #f59e0b; background: #fffbeb; }
        .claim-bar.verdict-false { border-left-color: #dc2626; background: #fef2f2; }
        .claim-score-pill { min-width: 48px; text-align: center; padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; color: #fff; }
        .pill-true { background: #16a34a; }
        .pill-uncertain { background: #f59e0b; }
        .pill-false { background: #dc2626; }
        .claim-text { font-size: 0.85rem; color: #1f2937; flex: 1; }
        .claim-reason { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }

        /* 交叉验证报告 */
        .cross-verify-card { margin-top: 10px; padding: 12px; border-radius: 8px; background: #fdf4ff; border: 1px solid #e9d5ff; }
        .cross-verify-card h4 { font-size: 0.9rem; font-weight: 600; color: #7c3aed; margin-bottom: 8px; }
        .source-tier-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .tier-chip { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; background: #ede9fe; color: #5b21b6; }
        .contradiction-alert { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px; margin-top: 6px; font-size: 0.8rem; color: #991b1b; }
        .trace-list { margin-top: 8px; display: grid; gap: 8px; }
        .trace-item { border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; padding: 8px 10px; }
        .trace-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
        .trace-pill { font-size: 0.72rem; padding: 1px 8px; border-radius: 9999px; background: #f3f4f6; color: #374151; }
        .trace-url { font-size: 0.75rem; color: #2563eb; word-break: break-all; }
        .trace-desc { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }

        .source-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 1px 7px;
            border-radius: 9999px;
            color: #fff;
            background: var(--badge, #6b7280);
            margin-right: 6px;
            vertical-align: middle;
        }
        .detail-toggle {
            cursor: pointer;
            color: #6366f1;
            font-size: 0.75rem;
            user-select: none;
        }
        .detail-content {
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.78rem;
            color: #4b5563;
            background: #f9fafb;
            border-radius: 4px;
            padding: 6px 8px;
            margin-top: 4px;
            max-height: 300px;
            overflow-y: auto;
        }
        .detail-content.open { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 导航栏 -->
<nav class="bg-indigo-600 text-white px-6 py-3 flex items-center justify-between shadow">
    <h1 class="text-xl font-bold">🔍 假新闻检测系统</h1>
    <div class="space-x-4">
        <a href="/" class="hover:underline font-semibold">💬 聊天查证</a>
        <a href="/database" class="hover:underline">📊 数据库</a>
        <a href="/source-credibility" class="hover:underline">🧭 信源知识库</a>
    </div>
</nav>

<div class="max-w-4xl mx-auto p-4 flex flex-col h-full">

    <!-- 聊天消息区 -->
    <div id="chatArea" class="chat-container overflow-y-auto space-y-4 p-4 bg-white rounded-lg shadow mb-4">
        <div id="welcome" class="text-center text-gray-400 py-8">
            <p class="text-lg">欢迎使用假新闻检测系统</p>
            <p class="text-sm mt-2">输入新闻文本（可附带图片），AI 将为您实时查证真假</p>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="bg-white rounded-lg shadow p-4">
        <!-- 功能控制栏 -->
        <div class="flex items-center gap-4 mb-3 pb-3 border-b border-gray-100">
            <label class="flex items-center gap-2 cursor-pointer select-none">
                <span class="text-sm text-gray-600">📊 对比数据库</span>
                <div class="relative">
                    <input type="checkbox" id="useDbToggle" checked class="sr-only peer" />
                    <div class="w-10 h-5 bg-gray-300 peer-checked:bg-indigo-500 rounded-full transition-colors"></div>
                    <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-5"></div>
                </div>
                <span id="dbToggleLabel" class="text-xs text-indigo-600 font-medium">已开启</span>
            </label>
            <span class="text-xs text-gray-400">关闭后查证时将跳过数据库比对，直接进行在线搜索验证</span>
        </div>
        <div id="imagePreview" class="hidden mb-3 flex items-center gap-3">
            <img id="previewImg" class="img-preview" />
            <button onclick="clearImage()" class="text-red-500 hover:text-red-700 text-sm">✕ 移除图片</button>
        </div>
        <div class="flex gap-3 items-end">
            <textarea id="textInput" rows="2"
                class="flex-1 border border-gray-300 rounded-lg px-4 py-2 resize-none focus:ring-2 focus:ring-indigo-400 focus:outline-none"
                placeholder="请输入需要查证的新闻文本..."></textarea>
            <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg border border-gray-300 flex items-center gap-1 transition">
                📷
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(this)" />
            </label>
            <button id="sendBtn" onclick="sendMessage()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition disabled:opacity-50">
                发送
            </button>
        </div>
    </div>
</div>

<script>
/* ── 数据库开关 ── */
document.getElementById('useDbToggle').addEventListener('change', function() {
    document.getElementById('dbToggleLabel').textContent = this.checked ? '已开启' : '已关闭';
    document.getElementById('dbToggleLabel').className = this.checked
        ? 'text-xs text-indigo-600 font-medium'
        : 'text-xs text-gray-400 font-medium';
});

/* ── 图片预览 ── */
function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').classList.remove('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }
}
function clearImage() {
    document.getElementById('imageInput').value = '';
    document.getElementById('imagePreview').classList.add('hidden');
}

/* ── 辅助 ── */
const SOURCE_LABELS = {
    main_agent: '主 Agent',
    initial_search_agent: '初步搜索智能体',
    evidence_collection_agent: '收集证据智能体',
    supplemental_search_agent: '补充搜索智能体',
    analysis_agent: '分析智能体',
    sub_agent_1: '子Agent-查证',
    sub_agent_claim: '子Agent-搜索规划',
    sub_agent_cross: '子Agent-交叉验证',
    sub_agent_2: '子Agent-入库',
    tool_a: '工具A 知识库',
    tool_b: '工具B 初始分析',
    tool_c1: '工具C1 搜索列表',
    tool_c2: '工具C2 片段抽取',
    tool_c3: '工具C3 全文读取',
    tool_d: '工具D 信源知识库',
    tool_e: '工具E 交叉验证',
    tool_f: '工具F 裁决入库',
    tool_save: '保存工具',
};
const TYPE_ICONS = {
    thinking: '💭', tool_input: '📥', tool_output: '📤', final: '📊', db_status: '💾',
};

function scoreClass(s) { if(s==null) return ''; return s<4?'score-low':s<7?'score-mid':'score-high'; }
function scoreLabel(s) { if(s==null) return '无法判断'; return s<4?'很可能是假新闻':s<6?'真假不确定':'很可能是真新闻'; }

let detailCounter = 0;
function makeEventCard(evt) {
    const id = 'det_' + (++detailCounter);
    const srcClass = 'src-' + (evt.source || 'main_agent');
    const typeClass = evt.type || '';
    const icon = TYPE_ICONS[evt.type] || '🔹';
    const srcLabel = SOURCE_LABELS[evt.source] || evt.source;
    let html = '<div class="evt-card ' + typeClass + ' ' + srcClass + ' bg-white rounded p-3 text-sm">';
    html += '<span class="source-badge">' + srcLabel + '</span>';
    html += '<span>' + icon + ' ' + escHtml(evt.message || '') + '</span>';
    if (evt.source === 'tool_e' && evt.data) {
        html += renderCrossVerifyData(evt.data);
    }
    if (evt.detail) {
        html += ' <span class="detail-toggle" onclick="toggleDetail(\'' + id + '\')">[展开详情]</span>';
        html += '<div id="' + id + '" class="detail-content">' + escHtml(evt.detail) + '</div>';
    }
    html += '</div>';
    return html;
}

function renderCrossVerifyData(data) {
    var html = '<div class="cross-verify-card">';
    html += '<h4>多源交叉验证</h4>';

    if (data.tier_distribution_readable) {
        html += '<div class="source-tier-bar">';
        Object.keys(data.tier_distribution_readable).forEach(function(key) {
            html += '<span class="tier-chip">' + escHtml(key) + ': ' + data.tier_distribution_readable[key] + '条</span>';
        });
        html += '</div>';
    }

    html += '<div class="text-xs text-gray-600">独立来源: ' + (data.independent_source_count || 0) + '/' + (data.total_source_count || 0) + '</div>';
    html += '<div class="text-xs text-gray-600">高相关证据: ' + (data.relevant_source_count || 0) + '条';
    if (data.filtered_out_count) {
        html += '，过滤低相关: ' + data.filtered_out_count + '条';
    }
    html += '</div>';

    var traceList = data.traceable_evidence || [];
    if (traceList.length > 0) {
        html += '<div class="trace-list">';
        traceList.forEach(function(item) {
            html += '<div class="trace-item">';
            html += '<div class="trace-meta">';
            html += '<span class="trace-pill">证据[' + escHtml(String(item.index || '?')) + ']</span>';
            html += '<span class="trace-pill">' + escHtml(item.display_status || '独立来源') + '</span>';
            html += '<span class="trace-pill">' + escHtml(item.source_name || '未知来源') + '</span>';
            html += '<span class="trace-pill">' + escHtml(item.country || '未知') + '</span>';
            html += '<span class="trace-pill">' + escHtml(item.tier_label || '❓ 未知来源') + '</span>';
            if (item.stance_label) {
                html += '<span class="trace-pill">' + escHtml(item.stance_label) + '</span>';
            }
            html += '</div>';
            if (item.title) {
                html += '<div class="text-xs text-gray-800">' + escHtml(item.title) + '</div>';
            }
            if (item.stance_reason) {
                html += '<div class="trace-desc">立场: ' + escHtml(item.stance_label || '➖中立') + '；理由: ' + escHtml(item.stance_reason) + '</div>';
            }
            if (item.group_description) {
                html += '<div class="trace-desc">' + escHtml(item.group_description) + '</div>';
            }
            if (item.url) {
                html += '<a class="trace-url" href="' + escAttr(safeUrl(item.url)) + '" target="_blank" rel="noopener noreferrer">' + escHtml(item.url) + '</a>';
            }
            html += '</div>';
        });
        html += '</div>';
    }

    if (data.source_diversity && data.source_diversity.countries_readable) {
        var countries = Object.entries(data.source_diversity.countries_readable)
            .map(function(entry) { return '<span class="tier-chip">' + escHtml(entry[0]) + ': ' + entry[1] + '条</span>'; })
            .join('');
        if (countries) {
            html += '<div class="source-tier-bar mt-2">' + countries + '</div>';
        }
    }

    if (data.cross_verify_score != null && data.cross_verify_score !== undefined) {
        html += '<div class="text-xs text-gray-500 mt-2">交叉验证加权得分: ' + parseFloat(data.cross_verify_score).toFixed(1) + '/10</div>';
    }
    html += '</div>';
    return html;
}

function makeFinalCard(data) {
    const cls = data.classification;
    let h = '<div class="bg-white border-2 border-indigo-200 rounded-lg p-4 mt-2">';
    h += '<div class="text-lg font-bold mb-2">📊 最终判断: ';
    h += '<span class="' + scoreClass(cls) + ' text-xl">' + (cls!=null ? parseFloat(cls).toFixed(1)+'/10':'—') + '</span>';
    h += ' <span class="text-base ml-2">' + scoreLabel(cls) + '</span></div>';
    h += '<p class="text-gray-700">' + escHtml(data.reason || '—') + '</p>';
    if (data.evidence_url) {
        h += '<p class="mt-2"><a href="' + data.evidence_url + '" target="_blank" class="text-blue-600 hover:underline">📎 证据链接</a></p>';
    }
    // ★ 声明可信度热力图
    if (data.claim_verdicts && data.claim_verdicts.length > 0) {
        h += '<div class="mt-3 mb-1 font-semibold text-sm text-gray-600">🔬 关键核查维度判断</div>';
        h += '<div class="claim-heatmap">';
        data.claim_verdicts.forEach(function(cv) {
            var vs = parseFloat(cv.verdict_score);
            var cls2 = vs >= 6 ? 'verdict-true' : vs >= 4 ? 'verdict-uncertain' : 'verdict-false';
            var pillCls = vs >= 6 ? 'pill-true' : vs >= 4 ? 'pill-uncertain' : 'pill-false';
            h += '<div class="claim-bar ' + cls2 + '">';
            h += '<span class="claim-score-pill ' + pillCls + '">' + vs.toFixed(1) + '</span>';
            h += '<div class="flex-1">';
            h += '<div class="claim-text">' + escHtml(cv.claim_text || cv.verdict_label || '') + '</div>';
            if (cv.verdict_reason) h += '<div class="claim-reason">' + escHtml(cv.verdict_reason) + '</div>';
            h += '</div></div>';
        });
        h += '</div>';
    }
    // ★ 交叉验证摘要
    if (data.has_contradiction) {
        h += '<div class="contradiction-alert mt-3">⚠️ <b>信源矛盾警告</b>: 不同层级的信息来源对此新闻给出了矛盾结论，判断结果已相应调整。</div>';
    }
    if (data.cross_verify_score != null && data.cross_verify_score !== undefined) {
        h += '<div class="text-xs text-gray-500 mt-2">交叉验证加权得分: ' + parseFloat(data.cross_verify_score).toFixed(1) + '/10</div>';
    }
    h += '</div>';
    return h;
}

function makeDbCard(data) {
    if (data.db_updated) {
        return '<div class="text-green-600 text-sm mt-2">✅ 已成功写入数据库 (ID: ' + data.new_id + ')</div>';
    }
    return '<div class="text-orange-500 text-sm mt-2">⚠️ 数据库未更新' + (data.db_error ? ': '+data.db_error : '') + '</div>';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return escHtml(s || ''); }
function safeUrl(url) {
    var value = String(url || '').trim();
    if (!/^https?:\/\//i.test(value)) {
        return '#';
    }
    return value;
}
function toggleDetail(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
    const tog = el.previousElementSibling;
    tog.textContent = el.classList.contains('open') ? '[收起详情]' : '[展开详情]';
}

/* ── 添加消息 ── */
function addMessage(role, html) {
    const chatArea = document.getElementById('chatArea');
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = 'rounded-lg p-4 ' + (role === 'user' ? 'msg-user ml-12' : 'msg-bot mr-12');
    div.innerHTML = html;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
}

/* ── 发送消息（SSE 流式） ── */
async function sendMessage() {
    const textInput = document.getElementById('textInput');
    const imageInput = document.getElementById('imageInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = textInput.value.trim();
    if (!text) { alert('请输入新闻文本'); return; }

    // 用户消息
    let userHtml = '<div class="font-semibold text-indigo-700 mb-1">📝 您的查证请求</div>';
    userHtml += '<p>' + escHtml(text).replace(/\n/g, '<br>') + '</p>';
    if (imageInput.files && imageInput.files[0]) {
        userHtml += '<img src="' + document.getElementById('previewImg').src + '" class="img-preview mt-2" />';
    }
    addMessage('user', userHtml);

    // 构建表单
    const formData = new FormData();
    formData.append('text', text);
    formData.append('use_db', document.getElementById('useDbToggle').checked ? 'true' : 'false');
    if (imageInput.files && imageInput.files[0]) {
        formData.append('image', imageInput.files[0]);
    }
    textInput.value = '';
    clearImage();

    // 创建 bot 消息容器
    const botDiv = addMessage('bot',
        '<div class="font-semibold text-indigo-700 mb-2">🤖 AI 查证过程</div>' +
        '<div id="evtStream" class="space-y-1"></div>' +
        '<div id="loadingIndicator" class="flex items-center gap-2 text-gray-400 text-sm mt-2">' +
        '<div class="spinner"></div><span>正在思考…</span></div>'
    );
    const evtStream = botDiv.querySelector('#evtStream');
    const loadingEl = botDiv.querySelector('#loadingIndicator');
    sendBtn.disabled = true;

    try {
        const resp = await fetch('/api/chat_stream', { method: 'POST', body: formData });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            // 处理 SSE 数据行
            while (buffer.indexOf('\n\n') !== -1) {
                const idx = buffer.indexOf('\n\n');
                const chunk = buffer.substring(0, idx).trim();
                buffer = buffer.substring(idx + 2);

                if (chunk.indexOf('data: ') !== 0) continue;
                const payload = chunk.substring(6);
                if (payload === '[DONE]') {
                    loadingEl.remove();
                    continue;
                }

                var evt;
                try { evt = JSON.parse(payload); } catch(e) { continue; }

                // 更新 loading 文字
                var srcLabel = SOURCE_LABELS[evt.source] || evt.source;
                loadingEl.querySelector('span').textContent = srcLabel + ' 正在处理…';

                if (evt.type === 'final') {
                    evtStream.insertAdjacentHTML('beforeend', makeFinalCard(evt.data || {}));
                } else if (evt.type === 'db_status') {
                    evtStream.insertAdjacentHTML('beforeend', makeEventCard(evt));
                    evtStream.insertAdjacentHTML('beforeend', makeDbCard(evt.data || {}));
                } else {
                    evtStream.insertAdjacentHTML('beforeend', makeEventCard(evt));
                }

                // 滚动到底部
                var chatArea = document.getElementById('chatArea');
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }
    } catch (err) {
        evtStream.insertAdjacentHTML('beforeend',
            '<div class="text-red-500 mt-2">❌ 请求失败: ' + err.message + '</div>');
        if (loadingEl) loadingEl.remove();
    } finally {
        sendBtn.disabled = false;
    }
}

// 回车发送
document.getElementById('textInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
